name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint Python
        run: ruff check .

      - name: Compile Python
        run: python -m py_compile gen_users.py
